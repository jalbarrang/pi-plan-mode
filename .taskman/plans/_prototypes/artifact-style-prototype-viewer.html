<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pi plan-mode — artifact viewer prototype</title>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#303030;--text:#f5f5f5;--muted:#999;--faint:#686868;--accent:#00d4aa;--accentDim:rgba(0,212,170,.12);--warn:#d4a72c;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:32px 24px}.browser{max-width:1080px;margin:auto;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface)}.browserbar{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border)}.traffic{display:flex;gap:6px}.traffic i{width:11px;height:11px;border-radius:50%;background:#3a3a3a}.address{flex:1;font:12px var(--mono);color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px}.address em{float:right;color:var(--faint);font-style:normal}.header{height:54px;padding:0 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}.meta{min-width:0}.meta h1{font-size:14px;margin:0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta p{font-size:12px;margin:1px 0 0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.grow{flex:1}.status{display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 9px;border:1px solid rgba(0,212,170,.35);border-radius:6px;white-space:nowrap}.dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}.versions{display:flex;border:1px solid var(--border);border-radius:7px;padding:2px}.versions button,.btn{border:0;color:var(--muted);background:transparent;border-radius:5px;padding:5px 10px;font:12px var(--mono);cursor:pointer}.versions button:hover,.versions button.active{color:var(--text);background:var(--surface2)}.versions button.latest{color:var(--accent)}.btn{font:13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:7px}.btn:hover{border-color:#555}.btn.live{color:var(--accent);border-color:rgba(0,212,170,.4);background:var(--accentDim)}.notice{display:none;padding:7px 16px;border-bottom:1px solid rgba(212,167,44,.25);background:var(--surface2);color:var(--warn);font-size:12px}.notice.show{display:flex;gap:10px}.notice a{color:var(--text);text-decoration:underline;cursor:pointer}.notice small{margin-left:auto;color:var(--faint);font:11px var(--mono)}.stage{position:relative;height:480px;background:#fafafa}.stage iframe{width:100%;height:100%;border:0;display:block;transition:opacity .15s}.toast{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);padding:7px 14px;border:1px solid var(--border);border-radius:7px;background:var(--surface);opacity:0;transition:opacity .15s}.toast.show{opacity:1}.feedback{display:none;border-top:1px solid var(--border);padding:14px 16px}.feedback.open{display:block}.feedback label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}.feedback textarea{width:100%;min-height:70px;resize:vertical;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:9px;font:13px/1.5 inherit}.actions{display:flex;align-items:center;gap:10px;margin-top:10px}.copied{color:var(--accent);font-size:12px;opacity:0}.copied.show{opacity:1}.hint{margin-left:auto;color:var(--faint);font:12px var(--mono)}.demo{max-width:1080px;margin:16px auto 0;display:flex;align-items:center;gap:10px;color:var(--faint);font-size:12px}.demo button{background:transparent;color:var(--muted);border:1px dashed var(--border);border-radius:7px;padding:5px 11px;cursor:pointer}@media(max-width:800px){.address em,.meta p,.btn.live{display:none}.header{height:auto;min-height:54px;flex-wrap:wrap;padding:9px 12px}.meta{width:100%}.grow{display:none}.stage{height:520px}}
</style>
</head>
<body>
<div class="browser">
<div class="browserbar"><div class="traffic"><i></i><i></i><i></i></div><div class="address">⌂ 127.0.0.1:8790/p/notification-settings <em>one URL for every revision</em></div></div>
<header class="header"><div class="meta"><h1>Notification settings — proposed redesign</h1><p>Validate grouped channels and per-channel mute before the plan hardens</p></div><div class="grow"></div><div class="status"><span class="dot"></span><span id="status">Live · v3</span></div><nav class="versions" id="versions"></nav><button class="btn live" id="live">Live updates</button><button class="btn" id="feedbackBtn">Give feedback</button></header>
<div class="notice" id="notice"><span id="noticeText"></span><a id="noticeAction"></a><small id="noticeNote"></small></div>
<div class="stage"><iframe id="frame" sandbox="allow-same-origin" title="Prototype preview"></iframe><div class="toast" id="toast"></div></div>
<div class="feedback" id="feedback"><label for="notes">Feedback for the agent — copied text includes the version you are reviewing</label><textarea id="notes" placeholder="e.g. Mute toggles read as disabled states — try switches with explicit on/off labels."></textarea><div class="actions"><button class="btn" id="copy">Copy for pi</button><span class="copied" id="copied">Copied — paste it into the pi session</span><span class="hint" id="context">re: prototype v3</span></div></div>
</div>
<div class="demo"><span>Demo:</span><button id="republish">Simulate agent revision → publish v4</button><span id="demoText"></span></div>
<script>
(function(){
const base='<style>body{font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1c1917;background:#fafafa;margin:0;padding:28px}.card{max-width:560px;margin:0 auto;background:#fff;border:1px solid #e5e5e3;border-radius:8px;padding:24px}h2{font-size:16px;margin:0 0 4px}.sub{color:#78716c;font-size:13px;margin:0 0 20px}.row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid #f0f0ee}.row:first-of-type{border-top:0}.row b{font-weight:500;font-size:14px;display:block}.row small{color:#78716c;font-size:12px}.ph{background:#eeedeb;border-radius:4px}.sw{width:36px;height:20px;border-radius:10px;background:#d6d3d1;position:relative;flex-shrink:0}.sw.on{background:#0f766e}.sw:after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff}.sw.on:after{left:18px}.group{font-size:11px;color:#78716c;font-weight:600;margin:20px 0 4px}.chk{width:16px;height:16px;border:1.5px solid #a8a29e;border-radius:4px}.chk.on{background:#0f766e;border-color:#0f766e}</style>';
function doc(n){if(n===1)return base+'<div class="card"><h2>Notifications</h2><p class="sub">v1 — rough structure and placeholder rows</p><div class="row"><div><b>Mentions</b><small>placeholder</small></div><div class="ph" style="width:36px;height:20px"></div></div><div class="row"><div><b>Replies</b><small>placeholder</small></div><div class="ph" style="width:36px;height:20px"></div></div><div class="ph" style="height:34px;margin-top:20px"></div></div>';if(n===2)return base+'<div class="card"><h2>Notifications</h2><p class="sub">v2 — real copy and checkbox pattern</p><div class="group">DIRECT</div><div class="row"><div><b>Mentions</b><small>When someone @mentions you</small></div><span class="chk on"></span></div><div class="row"><div><b>Replies</b><small>Replies to your threads</small></div><span class="chk on"></span></div><div class="group">SUMMARY</div><div class="row"><div><b>Daily digest</b><small>One email per day at 9:00</small></div><span class="chk"></span></div></div>';if(n===3)return base+'<div class="card"><h2>Notifications</h2><p class="sub">v3 — grouped channels with per-channel mute switches</p><div class="group">Direct activity</div><div class="row"><div><b>Mentions</b><small>When someone @mentions you</small></div><span class="sw on"></span></div><div class="row"><div><b>Replies</b><small>Replies to your threads</small></div><span class="sw on"></span></div><div class="group">Summaries</div><div class="row"><div><b>Daily digest</b><small>One email per day at 9:00</small></div><span class="sw"></span></div><div class="row"><div><b>Weekly report</b><small>Sent Monday mornings</small></div><span class="sw on"></span></div></div>';return base+'<div class="card"><h2>Notifications</h2><p class="sub">v4 — added quiet hours after review feedback</p><div class="group">Direct activity</div><div class="row"><div><b>Mentions</b><small>When someone @mentions you</small></div><span class="sw on"></span></div><div class="row"><div><b>Replies</b><small>Replies to your threads</small></div><span class="sw on"></span></div><div class="group">Summaries</div><div class="row"><div><b>Daily digest</b><small>One email per day at 9:00</small></div><span class="sw"></span></div><div class="group">Quiet hours</div><div class="row"><div><b>Pause overnight</b><small>22:00 – 08:00, local time</small></div><span class="sw on"></span></div></div>'}
let versions=[{label:'v1',note:'initial layout pass',doc:doc(1)},{label:'v2',note:'real copy + checkboxes',doc:doc(2)},{label:'v3',note:'groups + mute switches',doc:doc(3)}],current=2,live=true;const $=id=>document.getElementById(id),frame=$('frame');
function latest(){return versions.length-1}function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1800)}
function render(){frame.srcdoc=versions[current].doc;$('versions').innerHTML='';versions.forEach((v,i)=>{const b=document.createElement('button');b.textContent=v.label;b.title=v.note;if(i===current)b.classList.add('active');if(i===latest())b.classList.add('latest');b.onclick=()=>{current=i;render()};$('versions').appendChild(b)});const isLatest=current===latest();$('status').textContent=isLatest?(live?'Live · ':'Paused · ')+versions[current].label:'Snapshot · '+versions[current].label;$('context').textContent='re: prototype '+versions[current].label;$('notice').className='notice'+(!isLatest?' show':'');if(!isLatest){$('noticeText').textContent='Viewing an immutable snapshot. Live updates wait while you look back.';$('noticeAction').textContent='Jump to '+versions[latest()].label;$('noticeAction').onclick=()=>{current=latest();render()};$('noticeNote').textContent=versions[current].note}}
$('live').onclick=()=>{live=!live;$('live').classList.toggle('live',live);$('live').textContent=live?'Live updates':'Updates paused';render()};$('feedbackBtn').onclick=()=>{$('feedback').classList.toggle('open');$('notes').focus()};$('copy').onclick=()=>{const text='Prototype feedback ['+versions[current].label+' — '+versions[current].note+']:\n'+($('notes').value.trim()||'(add feedback here)');navigator.clipboard?.writeText(text);$('copied').classList.add('show');setTimeout(()=>$('copied').classList.remove('show'),1800)};$('republish').onclick=()=>{versions.push({label:'v4',note:'quiet hours after feedback',doc:doc(4)});if(live)current=latest();render();toast(live?'Updated in place to v4':'v4 is ready');$('demoText').textContent='Same URL and tab; an SSE event would trigger this swap.'};document.addEventListener('keydown',e=>{if(e.target===$('notes'))return;if(e.key==='['&&current>0){current--;render()}if(e.key===']'&&current<latest()){current++;render()}});render();
})();
</script>
</body>
</html>
